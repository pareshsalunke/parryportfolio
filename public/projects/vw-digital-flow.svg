<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 178" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="17" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e293b" letter-spacing="0.3">VW Group Digital Experience — User Journey Optimisation</text>

  <!-- Step 1: Product Page -->
  <rect x="10" y="26" width="200" height="105" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="110" cy="50" r="13" fill="#3b82f6"/>
  <text x="110" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="110" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">Product Page</text>
  <text x="110" y="86" text-anchor="middle" font-size="8" fill="#4b5563">Customer lands on</text>
  <text x="110" y="99" text-anchor="middle" font-size="8" fill="#4b5563">vehicle product page</text>
  <rect x="30" y="110" width="160" height="14" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="110" y="121" text-anchor="middle" font-size="7.5" fill="#dc2626">Before: Low engagement baseline</text>
  <line x1="211" y1="78" x2="227" y2="78" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 2: Redesigned Info Architecture -->
  <rect x="230" y="26" width="200" height="105" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="330" cy="50" r="13" fill="#3b82f6"/>
  <text x="330" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="330" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">Info Architecture</text>
  <text x="330" y="86" text-anchor="middle" font-size="8" fill="#4b5563">Restructured content</text>
  <text x="330" y="99" text-anchor="middle" font-size="8" fill="#4b5563">hierarchy &amp; navigation</text>
  <rect x="250" y="110" width="160" height="14" rx="4" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="330" y="121" text-anchor="middle" font-size="7.5" fill="#78350f">UX research · user testing</text>
  <line x1="431" y1="78" x2="447" y2="78" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 3: Virtual Booking Flow -->
  <rect x="450" y="26" width="200" height="105" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="550" cy="50" r="13" fill="#3b82f6"/>
  <text x="550" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="550" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">Virtual Booking</text>
  <text x="550" y="86" text-anchor="middle" font-size="8" fill="#4b5563">Guided step-by-step</text>
  <text x="550" y="99" text-anchor="middle" font-size="8" fill="#4b5563">appointment flow</text>
  <rect x="470" y="110" width="160" height="14" rx="4" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="550" y="121" text-anchor="middle" font-size="7.5" fill="#78350f">A/B tested · analytics driven</text>
  <line x1="651" y1="78" x2="667" y2="78" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 4: Results (success) -->
  <rect x="670" y="26" width="200" height="105" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="770" cy="50" r="13" fill="#16a34a"/>
  <text x="770" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
  <text x="770" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#15803d">Results</text>
  <text x="770" y="86" text-anchor="middle" font-size="8" fill="#374151">+8% engagement</text>
  <text x="770" y="99" text-anchor="middle" font-size="8" fill="#374151">+2% appointment conv.</text>
  <rect x="690" y="110" width="160" height="14" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="770" y="121" text-anchor="middle" font-size="7.5" fill="#15803d">VW Group customer impact</text>

  <!-- Impact footer -->
  <text x="440" y="170" text-anchor="middle" font-size="9" fill="#9ca3af">Customer-facing VW Group product pages · Engagement +8% · Appointment conversion +2% · Data-driven UX decisions</text>
</svg>
