<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 172" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arro" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="17" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e293b" letter-spacing="0.3">Fleet Monitoring &amp; Incident Management — Live Operations</text>

  <!-- Step 1: Vehicle Telemetry -->
  <rect x="16" y="26" width="152" height="90" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="92" cy="50" r="13" fill="#3b82f6"/>
  <text x="92" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="92" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">Vehicle Telemetry</text>
  <text x="92" y="86" text-anchor="middle" font-size="8" fill="#4b5563">Real-time status</text>
  <text x="92" y="99" text-anchor="middle" font-size="8" fill="#4b5563">100-vehicle fleet</text>
  <line x1="169" y1="71" x2="185" y2="71" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 2: Anomaly Detection -->
  <rect x="190" y="26" width="152" height="90" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <circle cx="266" cy="50" r="13" fill="#f97316"/>
  <text x="266" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="266" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#c2410c">Anomaly Detection</text>
  <text x="266" y="86" text-anchor="middle" font-size="8" fill="#4b5563">Automated alerting</text>
  <text x="266" y="99" text-anchor="middle" font-size="8" fill="#4b5563">Threshold triggers</text>
  <line x1="343" y1="71" x2="359" y2="71" stroke="#f97316" stroke-width="1.8" marker-end="url(#arro)"/>

  <!-- Step 3: Safety Escalation -->
  <rect x="364" y="26" width="152" height="90" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <circle cx="440" cy="50" r="13" fill="#f97316"/>
  <text x="440" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="440" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#c2410c">Safety Escalation</text>
  <text x="440" y="86" text-anchor="middle" font-size="8" fill="#4b5563">Structured workflow</text>
  <text x="440" y="99" text-anchor="middle" font-size="8" fill="#4b5563">Ops, fleet, compliance</text>
  <line x1="517" y1="71" x2="533" y2="71" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 4: Remote Supervision -->
  <rect x="538" y="26" width="152" height="90" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="614" cy="50" r="13" fill="#3b82f6"/>
  <text x="614" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
  <text x="614" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">Remote Supervision</text>
  <text x="614" y="86" text-anchor="middle" font-size="8" fill="#4b5563">Ops response</text>
  <text x="614" y="99" text-anchor="middle" font-size="8" fill="#4b5563">No physical intervention</text>
  <line x1="691" y1="71" x2="707" y2="71" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 5: Post-Incident Review (success) -->
  <rect x="712" y="26" width="152" height="90" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="788" cy="50" r="13" fill="#16a34a"/>
  <text x="788" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">5</text>
  <text x="788" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#15803d">Post-Incident Review</text>
  <text x="788" y="86" text-anchor="middle" font-size="8" fill="#374151">Audit trail closed</text>
  <text x="788" y="99" text-anchor="middle" font-size="8" fill="#374151">Compliance confirmed</text>

  <!-- Impact footer -->
  <text x="440" y="164" text-anchor="middle" font-size="9" fill="#9ca3af">100-vehicle fleet · 3 user groups: ops, fleet operators, safety/compliance · EU + US · Austin, Munich, Hamburg, Oslo</text>
</svg>
