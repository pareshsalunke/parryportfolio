<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 178" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="17" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e293b" letter-spacing="0.3">Connected Vehicle SIM Management — eSIM Profile Switching</text>

  <!-- Step 1: Vehicle eSIM -->
  <rect x="16" y="26" width="152" height="90" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="92" cy="50" r="13" fill="#3b82f6"/>
  <text x="92" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="92" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">Vehicle eSIM</text>
  <text x="92" y="86" text-anchor="middle" font-size="8" fill="#4b5563">Bootstrap profile</text>
  <text x="92" y="99" text-anchor="middle" font-size="8" fill="#4b5563">loaded at factory</text>
  <line x1="169" y1="71" x2="185" y2="71" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 2: Platform Auth -->
  <rect x="190" y="26" width="152" height="90" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="266" cy="50" r="13" fill="#3b82f6"/>
  <text x="266" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="266" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">Platform Auth</text>
  <text x="266" y="86" text-anchor="middle" font-size="8" fill="#4b5563">mTLS cert exchange</text>
  <text x="266" y="99" text-anchor="middle" font-size="8" fill="#4b5563">Vehicle registered</text>
  <line x1="343" y1="71" x2="359" y2="71" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 3: MNO Selection -->
  <rect x="364" y="26" width="152" height="90" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="440" cy="50" r="13" fill="#3b82f6"/>
  <text x="440" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="440" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">MNO Selection</text>
  <text x="440" y="86" text-anchor="middle" font-size="8" fill="#4b5563">4 partners (2 EU,</text>
  <text x="440" y="99" text-anchor="middle" font-size="8" fill="#4b5563">2 US) · Auto-switch</text>
  <line x1="517" y1="71" x2="533" y2="71" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 4: SM-DP+ Push -->
  <rect x="538" y="26" width="152" height="90" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <circle cx="614" cy="50" r="13" fill="#3b82f6"/>
  <text x="614" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
  <text x="614" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">SM-DP+ Push</text>
  <text x="614" y="86" text-anchor="middle" font-size="8" fill="#4b5563">Encrypted profile</text>
  <text x="614" y="99" text-anchor="middle" font-size="8" fill="#4b5563">delivered OTA</text>
  <line x1="691" y1="71" x2="707" y2="71" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 5: Operational Active (success) -->
  <rect x="712" y="26" width="152" height="90" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="788" cy="50" r="13" fill="#16a34a"/>
  <text x="788" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">5</text>
  <text x="788" y="73" text-anchor="middle" font-size="9" font-weight="600" fill="#15803d">Operational</text>
  <text x="788" y="86" text-anchor="middle" font-size="8" fill="#374151">Full connectivity</text>
  <text x="788" y="99" text-anchor="middle" font-size="8" fill="#374151">3 eSIM profiles</text>

  <!-- MNO Badges below step 3 -->
  <rect x="334" y="124" width="56" height="22" rx="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="362" y="139" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">EU MNO 1</text>

  <rect x="396" y="124" width="56" height="22" rx="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="424" y="139" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">EU MNO 2</text>

  <rect x="458" y="124" width="56" height="22" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="486" y="139" text-anchor="middle" font-size="8" font-weight="600" fill="#075985">US MNO 1</text>

  <rect x="520" y="124" width="56" height="22" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="548" y="139" text-anchor="middle" font-size="8" font-weight="600" fill="#075985">US MNO 2</text>

  <!-- Connecting lines from step 3 to MNO badges -->
  <line x1="440" y1="117" x2="362" y2="123" stroke="#d1d5db" stroke-width="1" marker-end="url(#arrg)"/>
  <line x1="440" y1="117" x2="424" y2="123" stroke="#d1d5db" stroke-width="1" marker-end="url(#arrg)"/>
  <line x1="440" y1="117" x2="486" y2="123" stroke="#d1d5db" stroke-width="1" marker-end="url(#arrg)"/>
  <line x1="440" y1="117" x2="548" y2="123" stroke="#d1d5db" stroke-width="1" marker-end="url(#arrg)"/>

  <!-- Impact footer -->
  <text x="440" y="170" text-anchor="middle" font-size="9" fill="#9ca3af">Replaced manual error-prone SIM management · 3 eSIM profiles · 4 MNO partners · Production deployed</text>
</svg>
